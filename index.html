<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia Interactive Infantil</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            background: linear-gradient(to bottom, #bae6fd, #e0f2fe);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: all 0.8s ease;
            position: relative;
        }

        /* Nubes mágicas */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 100px;
            animation: float-clouds 20s infinite linear;
            z-index: 1;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
        }
        .c1 { width: 150px; height: 60px; top: 10%; left: -150px; animation-duration: 25s; }
        .c1::before { width: 70px; height: 70px; top: -35px; left: 20px; }
        .c1::after { width: 90px; height: 90px; top: -45px; left: 60px; }
        .c2 { width: 200px; height: 70px; top: 80%; left: -200px; animation-duration: 32s; animation-delay: 5s; }
        .c2::before { width: 90px; height: 90px; top: -45px; left: 30px; }
        .c2::after { width: 110px; height: 110px; top: -55px; left: 75px; }

        @keyframes float-clouds {
            0% { left: -250px; }
            100% { left: 105vw; }
        }

        /* ESCENARIO FIJO DE DOS NIÑOS */
        .stage {
            display: flex;
            gap: 50px;
            align-items: center;
            justify-content: center;
            z-index: 5;
            height: 300px;
        }

        /* DISEÑO BASE DEL NIÑO / NIÑA */
        .child {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1), inset -6px -6px 12px rgba(0,0,0,0.1);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: gentle-float 4s ease-in-out infinite;
        }
        
        .boy { background: #fbcfe8; }
        .girl { background: #fed7aa; }

        /* CABELLO NIÑO */
        .boy .hair {
            position: absolute;
            top: -10px;
            width: 180px;
            height: 60px;
            background: #7c2d12;
            border-radius: 100px 100px 20px 20px;
            z-index: 3;
        }
        .boy .hair-fringe {
            position: absolute;
            top: 42px; left: 20px;
            width: 0; height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 18px solid #7c2d12;
            filter: drop-shadow(30px 0 0 #7c2d12) drop-shadow(60px 0 0 #7c2d12);
        }

        /* CABELLO NIÑA (Corto Oscuro + Moño Rojizo) */
        .girl .hair {
            position: absolute;
            top: -10px;
            width: 180px;
            height: 55px;
            background: #1e293b;
            border-radius: 100px 100px 15px 15px;
            z-index: 3;
        }
        .girl .bow {
            position: absolute;
            top: -18px;
            left: 70px;
            width: 36px;
            height: 20px;
            background: #dc2626;
            border-radius: 5px;
            z-index: 4;
        }
        .girl .bow::before, .girl .bow::after {
            content: '';
            position: absolute;
            top: -3px; width: 15px; height: 26px;
            background: #b91c1c; border-radius: 50%;
        }
        .girl .bow::before { left: -9px; transform: rotate(-20deg); }
        .girl .bow::after { right: -9px; transform: rotate(20deg); }

        /* OJOS GIGANTES */
        .eyes-container {
            display: flex;
            gap: 32px;
            margin-top: 35px;
            margin-bottom: 10px;
            z-index: 6;
        }
        .eye {
            width: 30px;
            height: 30px;
            background: #0f172a;
            border-radius: 50%;
            position: relative;
            transition: all 0.4s ease;
        }
        .eye::after {
            content: '';
            position: absolute;
            top: 4px; left: 5px;
            width: 10px; height: 10px;
            background: white;
            border-radius: 50%;
        }

        /* BOCA */
        .mouth {
            width: 55px;
            height: 26px;
            background: #451a03;
            border-radius: 0 0 55px 55px;
            transition: all 0.4s ease;
            z-index: 6;
        }

        /* LÁGRIMAS */
        .teardrop-container {
            position: absolute;
            width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none; z-index: 7; display: none;
        }
        .teardrop {
            position: absolute;
            width: 12px; height: 12px;
            background: #38bdf8;
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
            animation: drop-fall 1s infinite linear;
        }
        .t1 { left: 40px; top: 95px; }
        .t2 { right: 40px; top: 95px; animation-delay: 0.4s; }

        /* EFECTO Zzz */
        .zzz {
            position: absolute;
            top: -15px; right: -5px;
            font-size: 1.8rem; font-weight: bold;
            color: #818cf8; opacity: 0;
            transition: opacity 0.3s; z-index: 8;
        }

        /* MANO PARA SALUDAR */
        .hand-wave {
            position: absolute;
            bottom: 15px; right: -12px;
            width: 32px; height: 32px;
            background: #fbcfe8;
            border-radius: 50%;
            display: none;
            z-index: 6;
            box-shadow: -2px 4px 10px rgba(0,0,0,0.1);
        }
        .girl .hand-wave { background: #fed7aa; }

        /* ================= ESTADOS DE ANIMACIÓN ================= */

        /* [S] DORMIR */
        body.sleep-mode { background: linear-gradient(to bottom, #1e1b4b, #312e81); }
        body.sleep-mode .eye { height: 6px; border-radius: 0 0 30px 30px; background: #451a03; }
        body.sleep-mode .eye::after { opacity: 0; }
        body.sleep-mode .mouth { width: 18px; height: 12px; border-radius: 50%; }
        body.sleep-mode .zzz { opacity: 1; animation: zzz-float 2s infinite ease-in-out; }

        /* [B] LLORAR */
        body.sad-mode { background: linear-gradient(to bottom, #475569, #334155); }
        body.sad-mode .child { animation: shiver 0.15s infinite; }
        body.sad-mode .eye { height: 10px; border-radius: 30px 30px 0 0; }
        body.sad-mode .eye::after { opacity: 0; }
        body.sad-mode .mouth { width: 45px; height: 18px; border-radius: 45px 45px 0 0; transform: translateY(4px); }
        body.sad-mode .teardrop-container { display: block; }

        /* [A] ALEGRE */
        body.happy-mode { background: linear-gradient(to bottom, #f0fdf4, #bbf7d0); }
        body.happy-mode .child { animation: jump-victory 0.5s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        body.happy-mode .mouth { width: 60px; height: 32px; }

        /* [H / J] SALUDANDO */
        body.greet-mode { background: linear-gradient(to bottom, #fef08a, #fef9c3); }
        body.greet-mode .child { animation: wave-body 0.6s infinite alternate ease-in-out; }
        body.greet-mode .mouth { width: 55px; height: 30px; border-radius: 0 0 55px 55px; }
        body.greet-mode .hand-wave { display: block; animation: wave-hand 0.3s infinite alternate ease-in-out; }

        /* ================= ANIMACIONES GLOBALES ================= */
        @keyframes gentle-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes shiver { 0% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, -1px); } }
        @keyframes jump-victory { 0% { transform: translateY(0); } 100% { transform: translateY(-35px); } }
        @keyframes zzz-float { 0% { transform: translate(0,0) scale(0.6); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(20px, -35px) scale(1.1); opacity: 0; } }
        @keyframes drop-fall { 0% { transform: translateY(0) rotate(45deg) scale(0.5); opacity: 1; } 100% { transform: translateY(70px) rotate(45deg) scale(1); opacity: 0; } }
        @keyframes wave-body { 0% { transform: rotate(-5deg); } 100% { transform: rotate(5deg); } }
        @keyframes wave-hand { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(-8px, -12px) rotate(-40deg); } }

        /* Controles ocultos abajo para soporte táctil */
        .controls { position: absolute; bottom: 15px; display: flex; gap: 8px; z-index: 20; opacity: 0.05; transition: opacity 0.3s; }
        .controls:hover { opacity: 1; }
        .controls button { padding: 5px 10px; font-size: 0.8rem; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="cloud c1"></div>
    <div class="cloud c2"></div>

    <div class="stage">
        <!-- NIÑO -->
        <div class="child boy">
            <div class="hair"><div class="hair-fringe"></div></div>
            <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
            <div class="mouth"></div>
            <div class="zzz">Zzz</div>
            <div class="hand-wave"></div>
            <div class="teardrop-container"><div class="teardrop t1"></div><div class="teardrop t2"></div></div>
        </div>

        <!-- NIÑA -->
        <div class="child girl">
            <div class="hair"><div class="bow"></div></div>
            <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
            <div class="mouth"></div>
            <div class="zzz">Zzz</div>
            <div class="hand-wave"></div>
            <div class="teardrop-container"><div class="teardrop t1"></div><div class="teardrop t2"></div></div>
        </div>
    </div>

    <!-- Mini botones invisibles abajo -->
    <div class="controls">
        <button onclick="changeState('s')">S</button>
        <button onclick="changeState('b')">B</button>
        <button onclick="changeState('a')">A</button>
        <button onclick="changeState('h')">H</button>
    </div>

    <script>
        const body = document.body;

        function changeState(key) {
            switch(key) {
                case 's': body.className = 'sleep-mode'; break;
                case 'b': body.className = 'sad-mode'; break;
                case 'a': body.className = 'happy-mode'; break;
                case 'h': case 'j': body.className = 'greet-mode'; break;
            }
        }

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['s', 'b', 'a', 'h', 'j'].includes(key)) {
                changeState(key);
            }
        });
    </script>
</body>
</html>
