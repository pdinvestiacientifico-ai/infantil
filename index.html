<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia Interactiva Infantil</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            background: linear-gradient(to bottom, #bae6fd, #e0f2fe);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: all 0.8s ease;
            position: relative;
        }

        /* Nubes mágicas */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 100px;
            animation: float-clouds 20s infinite linear;
            z-index: 1;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
        }
        .c1 { width: 150px; height: 60px; top: 10%; left: -150px; animation-duration: 25s; }
        .c1::before { width: 70px; height: 70px; top: -35px; left: 20px; }
        .c1::after { width: 90px; height: 90px; top: -45px; left: 60px; }
        .c2 { width: 200px; height: 70px; top: 80%; left: -200px; animation-duration: 32s; animation-delay: 5s; }
        .c2::before { width: 90px; height: 90px; top: -45px; left: 30px; }
        .c2::after { width: 110px; height: 110px; top: -55px; left: 75px; }

        @keyframes float-clouds {
            0% { left: -250px; }
            100% { left: 105vw; }
        }

        /* ESCENARIO FIJO DE DOS NIÑOS */
        .stage {
            display: flex;
            gap: 120px; /* Un poco más de espacio para las manos exteriores */
            align-items: center;
            justify-content: center;
            z-index: 5;
            height: 500px;
        }

        /* DISEÑO BASE DEL NIÑO / NIÑA */
        .child {
            width: 340px;
            height: 340px;
            border-radius: 50%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1), inset -12px -12px 24px rgba(0,0,0,0.1);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: gentle-float 4s ease-in-out infinite;
        }
        
        .boy { background: #fbcfe8; }
        .girl { background: #fed7aa; }

        /* CABELLO NIÑO */
        .boy .hair {
            position: absolute;
            top: -20px;
            width: 360px;
            height: 120px;
            background: #7c2d12;
            border-radius: 200px 200px 40px 40px;
            z-index: 3;
        }
        .boy .hair-fringe {
            position: absolute;
            top: 84px; left: 40px;
            width: 0; height: 0;
            border-left: 28px solid transparent;
            border-right: 28px solid transparent;
            border-top: 36px solid #7c2d12;
            filter: drop-shadow(60px 0 0 #7c2d12) drop-shadow(120px 0 0 #7c2d12) drop-shadow(180px 0 0 #7c2d12);
        }

        /* CABELLO NIÑA */
        .girl .hair {
            position: absolute;
            top: -20px;
            width: 360px;
            height: 110px;
            background: #1e293b;
            border-radius: 200px 200px 30px 30px;
            z-index: 3;
        }
        .girl .bow {
            position: absolute;
            top: -36px;
            left: 140px;
            width: 72px;
            height: 40px;
            background: #dc2626;
            border-radius: 10px;
            z-index: 4;
        }
        .girl .bow::before, .girl .bow::after {
            content: '';
            position: absolute;
            top: -6px; width: 30px; height: 52px;
            background: #b91c1c; border-radius: 50%;
        }
        .girl .bow::before { left: -18px; transform: rotate(-20deg); }
        .girl .bow::after { right: -18px; transform: rotate(20deg); }

        /* OJOS GIGANTES */
        .eyes-container {
            display: flex;
            gap: 64px;
            margin-top: 70px;
            margin-bottom: 20px;
            z-index: 6;
        }
        .eye {
            width: 60px;
            height: 60px;
            background: #0f172a;
            border-radius: 50%;
            position: relative;
            transition: all 0.4s ease;
        }
        .eye::after {
            content: '';
            position: absolute;
            top: 8px; left: 10px;
            width: 20px; height: 20px;
            background: white;
            border-radius: 50%;
        }

        /* BOCA */
        .mouth {
            width: 110px;
            height: 52px;
            background: #451a03;
            border-radius: 0 0 110px 110px;
            transition: all 0.4s ease;
            z-index: 6;
        }

        /* LÁGRIMAS */
        .teardrop-container {
            position: absolute;
            width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none; z-index: 7; display: none;
        }
        .teardrop {
            position: absolute;
            width: 24px; height: 24px;
            background: #38bdf8;
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
            animation: drop-fall 1s infinite linear;
        }
        .t1 { left: 80px; top: 190px; }
        .t2 { right: 80px; top: 190px; animation-delay: 0.4s; }

        /* EFECTO Zzz */
        .zzz {
            position: absolute;
            top: -30px; right: -10px;
            font-size: 3.5rem; font-weight: bold;
            color: #818cf8; opacity: 0;
            transition: opacity 0.3s; z-index: 8;
        }

        /* SISTEMA DE DOS MANOS (Izquierda y Derecha) */
        .hand {
            position: absolute;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            z-index: 6;
            transition: all 0.4s ease;
        }
        .boy .hand { background: #fbcfe8; box-shadow: 0 8px 15px rgba(0,0,0,0.08); }
        .girl .hand { background: #fed7aa; box-shadow: 0 8px 15px rgba(0,0,0,0.08); }

        /* Posición estática en reposo */
        .hand-left { bottom: 25px; left: -20px; }
        .hand-right { bottom: 25px; right: -20px; }

        /* ================= ESTADOS DE ANIMACIÓN ================= */

        /* [S] DORMIR */
        body.sleep-mode { background: linear-gradient(to bottom, #1e1b4b, #312e81); }
        body.sleep-mode .eye { height: 12px; border-radius: 0 0 60px 60px; background: #451a03; }
        body.sleep-mode .eye::after { opacity: 0; }
        body.sleep-mode .mouth { width: 36px; height: 24px; border-radius: 50%; }
        body.sleep-mode .zzz { opacity: 1; animation: zzz-float 2s infinite ease-in-out; }
        body.sleep-mode .hand { bottom: 15px; } /* Manitas relajadas abajo */

        /* [B] LLORAR */
        body.sad-mode { background: linear-gradient(to bottom, #475569, #334155); }
        body.sad-mode .child { animation: shiver 0.15s infinite; }
        body.sad-mode .eye { height: 20px; border-radius: 60px 60px 0 0; }
        body.sad-mode .eye::after { opacity: 0; }
        body.sad-mode .mouth { width: 90px; height: 36px; border-radius: 90px 90px 0 0; transform: translateY(8px); }
        body.sad-mode .teardrop-container { display: block; }
        body.sad-mode .hand { bottom: 40px; transform: scale(0.9); } /* Manitas encogidas de tristeza */

        /* [A] ALEGRE */
        body.happy-mode { background: linear-gradient(to bottom, #f0fdf4, #bbf7d0); }
        body.happy-mode .child { animation: jump-victory 0.5s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        body.happy-mode .mouth { width: 120px; height: 64px; }
        body.happy-mode .hand { bottom: 80px; } /* Manos arriba celebrando */

        /* [H / J] SALUDANDO (Estado Inicial) */
        body.greet-mode { background: linear-gradient(to bottom, #fef08a, #fef9c3); }
        body.greet-mode .child { animation: wave-body 0.6s infinite alternate ease-in-out; }
        body.greet-mode .mouth { width: 110px; height: 60px; border-radius: 0 0 110px 110px; }
        /* Las dos manos cobran vida y saludan de forma intercalada */
        body.greet-mode .hand-left { animation: wave-hand-left 0.3s infinite alternate ease-in-out; }
        body.greet-mode .hand-right { animation: wave-hand-right 0.3s infinite alternate ease-in-out; animation-delay: 0.15s; }

        /* ================= ANIMACIONES GLOBALES ================= */
        @keyframes gentle-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes shiver { 0% { transform: translate(2px, 2px); } 100% { transform: translate(-2px, -2px); } }
        @keyframes jump-victory { 0% { transform: translateY(0); } 100% { transform: translateY(-70px); } }
        @keyframes zzz-float { 0% { transform: translate(0,0) scale(0.6); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(40px, -70px) scale(1.1); opacity: 0; } }
        @keyframes drop-fall { 0% { transform: translateY(0) rotate(45deg) scale(0.5); opacity: 1; } 100% { transform: translateY(120px) rotate(45deg) scale(1); opacity: 0; } }
        @keyframes wave-body { 0% { transform: rotate(-5deg); } 100% { transform: rotate(5deg); } }
        
        /* Movimiento alegre de las dos manos */
        @keyframes wave-hand-left { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(12px, -20px) rotate(35deg); } }
        @keyframes wave-hand-right { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(-12px, -20px) rotate(-35deg); } }

        /* Controles ocultos abajo */
        .controls { position: absolute; bottom: 15px; display: flex; gap: 8px; z-index: 20; opacity: 0.05; transition: opacity 0.3s; }
        .controls:hover { opacity: 1; }
        .controls button { padding: 5px 10px; font-size: 0.8rem; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body class="greet-mode"> <!-- Inicia directamente saludando -->

    <div class="cloud c1"></div>
    <div class="cloud c2"></div>

    <div class="stage">
        <!-- NIÑO -->
        <div class="child boy">
            <div class="hair"><div class="hair-fringe"></div></div>
            <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
            <div class="mouth"></div>
            <div class="zzz">Zzz</div>
            <div class="hand hand-left"></div>
            <div class="hand hand-right"></div>
            <div class="teardrop-container"><div class="teardrop t1"></div><div class="teardrop t2"></div></div>
        </div>

        <!-- NIÑA -->
        <div class="child girl">
            <div class="hair"><div class="bow"></div></div>
            <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
            <div class="mouth"></div>
            <div class="zzz">Zzz</div>
            <div class="hand hand-left"></div>
            <div class="hand hand-right"></div>
            <div class="teardrop-container"><div class="teardrop t1"></div><div class="teardrop t2"></div></div>
        </div>
    </div>

    <!-- Mini botones ocultos abajo -->
    <div class="controls">
        <button onclick="changeState('s')">S</button>
        <button onclick="changeState('b')">B</button>
        <button onclick="changeState('a')">A</button>
        <button onclick="changeState('h')">H</button>
    </div>

    <script>
        const body = document.body;

        function changeState(key) {
            switch(key) {
                case 's': body.className = 'sleep-mode'; break;
                case 'b': body.className = 'sad-mode'; break;
                case 'a': body.className = 'happy-mode'; break;
                case 'h': case 'j': body.className = 'greet-mode'; break;
            }
        }

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['s', 'b', 'a', 'h', 'j'].includes(key)) {
                changeState(key);
            }
        });
    </script>
</body>
</html>
