<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia Interactiva Infantil</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            background: linear-gradient(to bottom, #bae6fd, #e0f2fe);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: all 0.8s ease;
            position: relative;
        }

        /* Nubes mágicas */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 100px;
            animation: float-clouds 20s infinite linear;
            z-index: 1;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
        }
        .c1 { width: 150px; height: 60px; top: 10%; left: -150px; animation-duration: 25s; }
        .c1::before { width: 70px; height: 70px; top: -35px; left: 20px; }
        .c1::after { width: 90px; height: 90px; top: -45px; left: 60px; }

        .c2 { width: 200px; height: 70px; top: 75%; left: -200px; animation-duration: 32s; animation-delay: 5s; }
        .c2::before { width: 90px; height: 90px; top: -45px; left: 30px; }
        .c2::after { width: 110px; height: 110px; top: -55px; left: 75px; }

        @keyframes float-clouds {
            0% { left: -250px; }
            100% { left: 105vw; }
        }

        #guide {
            position: absolute;
            top: 20px;
            font-size: 1.1rem;
            color: #475569;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            font-weight: bold;
            z-index: 10;
            text-align: center;
            line-height: 1.5;
        }
        #guide span { color: #e11d48; font-weight: 900; }

        /* ESCENARIO DINÁMICO */
        .stage {
            display: flex;
            gap: 30px;
            align-items: center;
            justify-content: center;
            z-index: 5;
            width: 90%;
            max-width: 1200px;
            height: 360px;
            flex-wrap: wrap;
        }

        /* DISEÑO BASE DEL NIÑO / NIÑA */
        .child {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1), inset -6px -6px 12px rgba(0,0,0,0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: gentle-float 4s ease-in-out infinite;
        }
        
        /* Tonos de piel alternados */
        .boy { background: #fbcfe8; }
        .girl { background: #fed7aa; }

        /* CABELLO NIÑO (Corto Marrón) */
        .boy .hair {
            position: absolute;
            top: -10px;
            width: 170px;
            height: 65px;
            background: #7c2d12;
            border-radius: 100px 100px 20px 20px;
            z-index: 3;
        }
        .boy .hair-fringe {
            position: absolute;
            top: 45px; left: 20px;
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 20px solid #7c2d12;
            filter: drop-shadow(30px 0 0 #7c2d12) drop-shadow(60px 0 0 #7c2d12);
        }

        /* CABELLO NIÑA CORREGIDO (Corto Oscuro + Moño Rojizo) */
        .girl .hair {
            position: absolute;
            top: -10px;
            width: 170px;
            height: 60px;
            background: #1e293b;
            border-radius: 100px 100px 15px 15px;
            z-index: 3;
        }
        /* Moño Rojizo Coqueto */
        .girl .bow {
            position: absolute;
            top: -22px;
            left: 65px;
            width: 40px;
            height: 22px;
            background: #dc2626; /* Color Rojizo */
            border-radius: 6px;
            z-index: 4;
        }
        .girl .bow::before, .girl .bow::after {
            content: '';
            position: absolute;
            top: -4px; width: 18px; height: 30px;
            background: #b91c1c; border-radius: 50%;
        }
        .girl .bow::before { left: -10px; transform: rotate(-20deg); }
        .girl .bow::after { right: -10px; transform: rotate(20deg); }

        /* OJOS GIGANTES */
        .eyes-container {
            display: flex;
            gap: 30px;
            margin-top: 35px;
            margin-bottom: 10px;
            z-index: 6;
        }
        .eye {
            width: 32px;
            height: 32px;
            background: #0f172a;
            border-radius: 50%;
            position: relative;
            transition: all 0.4s ease;
        }
        .eye::after {
            content: '';
            position: absolute;
            top: 4px; left: 5px;
            width: 11px; height: 11px;
            background: white;
            border-radius: 50%;
        }

        /* BOCA */
        .mouth {
            width: 55px;
            height: 28px;
            background: #451a03;
            border-radius: 0 0 55px 55px;
            transition: all 0.4s ease;
            z-index: 6;
        }

        /* LÁGRIMAS */
        .teardrop-container {
            position: absolute;
            width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none; z-index: 7; display: none;
        }
        .teardrop {
            position: absolute;
            width: 12px; height: 12px;
            background: #38bdf8;
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
            animation: drop-fall 1s infinite linear;
        }
        .t1 { left: 40px; top: 95px; }
        .t2 { right: 40px; top: 95px; animation-delay: 0.4s; }

        /* EFECTO Zzz */
        .zzz {
            position: absolute;
            top: -15px; right: -5px;
            font-size: 2rem; font-weight: bold;
            color: #818cf8; opacity: 0;
            transition: opacity 0.3s; z-index: 8;
        }

        /* MANO PARA SALUDAR */
        .hand-wave {
            position: absolute;
            bottom: 10px; right: -15px;
            width: 35px; height: 35px;
            background: inherit;
            border-radius: 50%;
            display: none;
            z-index: 6;
            box-shadow: -2px 4px 10px rgba(0,0,0,0.1);
        }

        /* TEXTO BANNER GIGANTE */
        #text-banner {
            margin-top: 30px;
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            color: #0369a1;
            text-shadow: 4px 4px 0px #ffffff;
            z-index: 5;
            transition: all 0.4s ease;
        }

        /* ================= ESTADOS CONFIGURADOS CORTOS ================= */

        /* [S] DORMIR */
        body.sleep-mode { background: linear-gradient(to bottom, #1e1b4b, #312e81); }
        body.sleep-mode .eye { height: 6px; border-radius: 0 0 32px 32px; background: #451a03; }
        body.sleep-mode .eye::after { opacity: 0; }
        body.sleep-mode .mouth { width: 20px; height: 12px; border-radius: 50%; }
        body.sleep-mode .zzz { opacity: 1; animation: zzz-float 2s infinite ease-in-out; }

        /* [B] LLORAR */
        body.sad-mode { background: linear-gradient(to bottom, #475569, #334155); }
        body.sad-mode .child { animation: shiver 0.15s infinite; }
        body.sad-mode .eye { height: 10px; border-radius: 32px 32px 0 0; }
        body.sad-mode .eye::after { opacity: 0; }
        body.sad-mode .mouth { width: 50px; height: 20px; border-radius: 50px 50px 0 0; transform: translateY(5px); }
        body.sad-mode .teardrop-container { display: block; }

        /* [A] ALEGRE */
        body.happy-mode { background: linear-gradient(to bottom, #f0fdf4, #bbf7d0); }
        body.happy-mode .child { animation: jump-victory 0.5s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        body.happy-mode .mouth { width: 65px; height: 38px; }

        /* [H / J] SALUDANDO (NUEVO) */
        body.greet-mode { background: linear-gradient(to bottom, #fef08a, #fef9c3); }
        body.greet-mode .child { animation: wave-body 0.6s infinite alternate ease-in-out; }
        body.greet-mode .mouth { width: 60px; height: 35px; border-radius: 0 0 60px 60px; }
        body.greet-mode .hand-wave { display: block; animation: wave-hand 0.3s infinite alternate ease-in-out; }

        /* ================= ANIMACIONES ================= */
        @keyframes gentle-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes shiver { 0% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, -1px); } }
        @keyframes jump-victory { 0% { transform: translateY(0); } 100% { transform: translateY(-40px); } }
        @keyframes zzz-float { 0% { transform: translate(0,0) scale(0.6); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(25px, -40px) scale(1.1); opacity: 0; } }
        @keyframes drop-fall { 0% { transform: translateY(0) rotate(45deg) scale(0.5); opacity: 1; } 100% { transform: translateY(80px) rotate(45deg) scale(1); opacity: 0; } }
        @keyframes wave-body { 0% { transform: rotate(-5deg); } 100% { transform: rotate(5deg); } }
        @keyframes wave-hand { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(-10px, -15px) rotate(-40deg); } }

        /* Controles */
        .controls { position: absolute; bottom: 20px; display: flex; gap: 12px; z-index: 20; flex-wrap: wrap; justify-content: center; }
        .controls button { 
            padding: 10px 20px; font-size: 1rem; border: none; border-radius: 20px; 
            font-weight: bold; cursor: pointer; background: white; box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .controls button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="cloud c1"></div>
    <div class="cloud c2"></div>

    <div id="guide">
        Teclas: [S] Dormir | [B] Llorar | [A] Alegre <br>
        <span>NUEVO: [H] Saludan 3 Niños | [J] Saludan 6 Niños</span>
    </div>

    <!-- Escenario donde se inyectan los niños dinámicamente -->
    <div class="stage" id="stage"></div>

    <div id="text-banner">¡BIENVENIDOS!</div>

    <div class="controls">
        <button style="color: #4f46e5;" onclick="changeState('s')">Teclas [S]</button>
        <button style="color: #dc2626;" onclick="changeState('b')">Teclas [B]</button>
        <button style="color: #16a34a;" onclick="changeState('a')">Teclas [A]</button>
        <button style="color: #b45309;" onclick="changeState('h')">Teclas [H] (3)</button>
        <button style="color: #7c3aed;" onclick="changeState('j')">Teclas [J] (6)</button>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const body = document.body;
        const banner = document.getElementById('text-banner');

        // Plantillas HTML limpias para Niño y Niña
        const templates = {
            boy: `
                <div class="child boy">
                    <div class="hair"><div class="hair-fringe"></div></div>
                    <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
                    <div class="mouth"></div>
                    <div class="zzz">Zzz</div>
                    <div class="hand-wave"></div>
                    <div class="teardrop-container"><div class="teardrop t1"></div><div class="teardrop t2"></div></div>
                </div>`,
            girl: `
                <div class="child girl">
                    <div class="hair"><div class="bow"></div></div>
                    <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
                    <div class="mouth"></div>
                    <div class="zzz">Zzz</div>
                    <div class="hand-wave"></div>
                    <div class="teardrop-container"><div class="teardrop t1"></div><div class="teardrop t2"></div></div>
                </div>`
        };

        // Función central para renderizar la cantidad exacta de niños
        function renderChildren(count) {
            stage.innerHTML = '';
            for (let i = 0; i < count; i++) {
                // Alterna entre niño y niña perfectamente
                const type = (i % 2 === 0) ? 'boy' : 'girl';
                stage.insertAdjacentHTML('beforeend', templates[type]);
            }
        }

        // Administrador de estados (Acciones de las teclas)
        function changeState(key) {
            switch(key) {
                case 's':
                    renderChildren(2);
                    body.className = 'sleep-mode';
                    banner.textContent = "SHHH... ¡A DORMIR!";
                    banner.style.color = "#a5b4fc";
                    banner.style.textShadow = "4px 4px 0px #1e1b4b";
                    break;
                case 'b':
                    renderChildren(2);
                    body.className = 'sad-mode';
                    banner.textContent = "MUY, MUY TRISTE...";
                    banner.style.color = "#cbd5e1";
                    banner.style.textShadow = "4px 4px 0px #1e293b";
                    break;
                case 'a':
                    renderChildren(2);
                    body.className = 'happy-mode';
                    banner.textContent = "¡ALLEGRES Y FELICES!";
                    banner.style.color = "#15803d";
                    banner.style.textShadow = "4px 4px 0px #ffffff";
                    break;
                case 'h':
                    renderChildren(3);
                    body.className = 'greet-mode';
                    banner.textContent = "¡HOLA TRES AMIGOS!";
                    banner.style.color = "#b45309";
                    banner.style.textShadow = "4px 4px 0px #ffffff";
                    break;
                case 'j':
                    renderChildren(6);
                    body.className = 'greet-mode';
                    banner.textContent = "¡BIENVENIDOS LOS 6!";
                    banner.style.color = "#6d28d9";
                    banner.style.textShadow = "4px 4px 0px #ffffff";
                    break;
            }
        }

        // Escucha del teclado global
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['s', 'b', 'a', 'h', 'j'].includes(key)) {
                changeState(key);
            }
        });

        // Iniciar por defecto con 2 niños
        renderChildren(2);
    </script>
</body>
</html>
