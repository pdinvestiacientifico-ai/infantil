<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia Interactiva Infantil</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            background: linear-gradient(to bottom, #bae6fd, #e0f2fe);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: all 0.8s ease;
            position: relative;
        }

        /* Nubes mágicas */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 100px;
            animation: float-clouds 20s infinite linear;
            z-index: 1;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
        }
        .c1 { width: 150px; height: 60px; top: 10%; left: -150px; animation-duration: 25s; }
        .c1::before { width: 70px; height: 70px; top: -35px; left: 20px; }
        .c1::after { width: 90px; height: 90px; top: -45px; left: 60px; }
        .c2 { width: 200px; height: 70px; top: 80%; left: -200px; animation-duration: 32s; animation-delay: 5s; }
        .c2::before { width: 90px; height: 90px; top: -45px; left: 30px; }
        .c2::after { width: 110px; height: 110px; top: -55px; left: 75px; }

        @keyframes float-clouds {
            0% { left: -250px; }
            100% { left: 105vw; }
        }

        /* CONTENEDOR EN CÍRCULO (RONDA MÁGICA) */
        .stage {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: all 0.5s ease;
        }

        /* Clase dinámica para activar el giro cuando juegan a la ronda */
        .circle-playing {
            animation: spin-ronda 12s infinite linear;
        }

        @keyframes spin-ronda {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* DISEÑO BASE DEL NIÑO / NIÑA */
        .child {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            position: absolute; /* Permite posicionamiento matemático en círculo */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1), inset -6px -6px 12px rgba(0,0,0,0.1);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: gentle-float 4s ease-in-out infinite;
        }
        
        .boy { background: #fbcfe8; }
        .girl { background: #fed7aa; }

        /* Para que los rostros no giren de cabeza cuando la ronda da vueltas */
        .child-inner {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: inherit;
        }
        .circle-playing .child-inner {
            animation: counter-spin-ronda 12s infinite linear;
        }
        @keyframes counter-spin-ronda {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        /* CABELLO NIÑO */
        .boy .hair {
            position: absolute;
            top: -8px;
            width: 140px;
            height: 50px;
            background: #7c2d12;
            border-radius: 100px 100px 20px 20px;
            z-index: 3;
        }
        .boy .hair-fringe {
            position: absolute;
            top: 35px; left: 15px;
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 15px solid #7c2d12;
            filter: drop-shadow(25px 0 0 #7c2d12) drop-shadow(50px 0 0 #7c2d12);
        }

        /* CABELLO NIÑA CORRECCIONAL (Corto Oscuro + Moño Rojizo) */
        .girl .hair {
            position: absolute;
            top: -8px;
            width: 140px;
            height: 45px;
            background: #1e293b;
            border-radius: 100px 100px 15px 15px;
            z-index: 3;
        }
        .girl .bow {
            position: absolute;
            top: -16px;
            left: 50px;
            width: 32px;
            height: 18px;
            background: #dc2626;
            border-radius: 5px;
            z-index: 4;
        }
        .girl .bow::before, .girl .bow::after {
            content: '';
            position: absolute;
            top: -3px; width: 14px; height: 24px;
            background: #b91c1c; border-radius: 50%;
        }
        .girl .bow::before { left: -8px; transform: rotate(-20deg); }
        .girl .bow::after { right: -8px; transform: rotate(20deg); }

        /* OJOS GIGANTES */
        .eyes-container {
            display: flex;
            gap: 24px;
            margin-top: 25px;
            margin-bottom: 8px;
            z-index: 6;
        }
        .eye {
            width: 26px;
            height: 26px;
            background: #0f172a;
            border-radius: 50%;
            position: relative;
            transition: all 0.4s ease;
        }
        .eye::after {
            content: '';
            position: absolute;
            top: 3px; left: 4px;
            width: 9px; height: 9px;
            background: white;
            border-radius: 50%;
        }

        /* BOCA */
        .mouth {
            width: 45px;
            height: 22px;
            background: #451a03;
            border-radius: 0 0 45px 45px;
            transition: all 0.4s ease;
            z-index: 6;
        }

        /* LÁGRIMAS */
        .teardrop-container {
            position: absolute;
            width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none; z-index: 7; display: none;
        }
        .teardrop {
            position: absolute;
            width: 10px; height: 10px;
            background: #38bdf8;
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
            animation: drop-fall 1s infinite linear;
        }
        .t1 { left: 30px; top: 75px; }
        .t2 { right: 30px; top: 75px; animation-delay: 0.4s; }

        /* EFECTO Zzz */
        .zzz {
            position: absolute;
            top: -10px; right: -5px;
            font-size: 1.6rem; font-weight: bold;
            color: #818cf8; opacity: 0;
            transition: opacity 0.3s; z-index: 8;
        }

        /* MANO PARA SALUDAR */
        .hand-wave {
            position: absolute;
            bottom: 10px; right: -10px;
            width: 28px; height: 28px;
            background: #fbcfe8;
            border-radius: 50%;
            display: none;
            z-index: 6;
        }
        .girl .hand-wave { background: #fed7aa; }

        /* ================= ESTADOS VISUALES DE ANIMACIÓN ================= */

        /* [S] DORMIR */
        body.sleep-mode { background: linear-gradient(to bottom, #1e1b4b, #312e81); }
        body.sleep-mode .eye { height: 5px; border-radius: 0 0 26px 26px; background: #451a03; }
        body.sleep-mode .eye::after { opacity: 0; }
        body.sleep-mode .mouth { width: 15px; height: 10px; border-radius: 50%; }
        body.sleep-mode .zzz { opacity: 1; animation: zzz-float 2s infinite ease-in-out; }

        /* [B] LLORAR */
        body.sad-mode { background: linear-gradient(to bottom, #475569, #334155); }
        body.sad-mode .child { animation: shiver 0.15s infinite; }
        body.sad-mode .eye { height: 8px; border-radius: 26px 26px 0 0; }
        body.sad-mode .eye::after { opacity: 0; }
        body.sad-mode .mouth { width: 40px; height: 15px; border-radius: 40px 40px 0 0; transform: translateY(4px); }
        body.sad-mode .teardrop-container { display: block; }

        /* [A] ALEGRE */
        body.happy-mode { background: linear-gradient(to bottom, #f0fdf4, #bbf7d0); }
        body.happy-mode .child { animation: jump-victory 0.5s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        body.happy-mode .mouth { width: 50px; height: 30px; }

        /* [H / J] SALUDANDO */
        body.greet-mode { background: linear-gradient(to bottom, #fef08a, #fef9c3); }
        body.greet-mode .child { animation: wave-body 0.6s infinite alternate ease-in-out; }
        body.greet-mode .hand-wave { display: block; animation: wave-hand 0.3s infinite alternate ease-in-out; }

        /* ================= ANIMACIONES GLOBAES ================= */
        @keyframes gentle-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes shiver { 0% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, -1px); } }
        @keyframes jump-victory { 0% { transform: translateY(0); } 100% { transform: translateY(-30px); } }
        @keyframes zzz-float { 0% { transform: translate(0,0) scale(0.6); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(20px, -30px) scale(1.1); opacity: 0; } }
        @keyframes drop-fall { 0% { transform: translateY(0) rotate(45deg) scale(0.5); opacity: 1; } 100% { transform: translateY(60px) rotate(45deg) scale(1); opacity: 0; } }
        @keyframes wave-body { 0% { transform: rotate(-4deg); } 100% { transform: rotate(4deg); } }
        @keyframes wave-hand { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(-8px, -12px) rotate(-40deg); } }
    </style>
</head>
<body>

    <!-- Escenario interactivo central sin letras -->
    <div class="stage" id="stage"></div>

    <script>
        const stage = document.getElementById('stage');
        const body = document.body;
        let currentChildrenCount = 2; // Inicia con dos niños

        const templates = {
            boy: `
                <div class="child boy">
                    <div class="child-inner">
                        <div class="hair"><div class="hair-fringe"></div></div>
                        <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
                        <div class="mouth"></div>
                        <div class="zzz">Zzz</div>
                        <div class="hand-wave"></div>
                        <div class="teardrop-container"><div class="teardrop t1"></div><div class="teardrop t2"></div></div>
                    </div>
                </div>`,
            girl: `
                <div class="child girl">
                    <div class="child-inner">
                        <div class="hair"><div class="bow"></div></div>
                        <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
                        <div class="mouth"></div>
                        <div class="zzz">Zzz</div>
                        <div class="hand-wave"></div>
                        <div class="teardrop-container"><div class="teardrop t1"></div><div class="teardrop t2"></div></div>
                    </div>
                </div>`
        };

        // Renderiza y organiza matemáticamente en un círculo
        function renderChildrenCircle(count) {
            stage.innerHTML = '';
            currentChildrenCount = count;

            // Si hay más de 2 niños, activamos la animación de girar en la ronda
            if (count > 2) {
                stage.classList.add('circle-playing');
            } else {
                stage.classList.remove('circle-playing');
            }

            const radius = 160; // Radio del círculo en píxeles
            const centerX = stage.clientWidth / 2;
            const centerY = stage.clientHeight / 2;

            for (let i = 0; i < count; i++) {
                const type = (i % 2 === 0) ? 'boy' : 'girl';
                stage.insertAdjacentHTML('beforeend', templates[type]);

                const element = stage.lastElementChild;

                // Si hay solo 2 niños los ponemos lado a lado de forma fija
                if (count === 2) {
                    element.style.position = 'static';
                    stage.style.display = 'flex';
                    stage.style.gap = '40px';
                } else {
                    // Cálculo matemático de distribución circular (Trigonometría clásica)
                    stage.style.display = 'block';
                    element.style.position = 'absolute';
                    const angle = (i * 2 * Math.PI) / count;
                    const x = centerX + radius * Math.cos(angle) - 65; // 65 es la mitad del ancho del niño
                    const y = centerY + radius * Math.sin(angle) - 65;
                    element.style.left = `${x}px`;
                    element.style.top = `${y}px`;
                }
            }
        }

        function changeState(key) {
            switch(key) {
                case 's':
                    renderChildrenCircle(currentChildrenCount + 2); // Agrega 2 más
                    body.className = 'sleep-mode';
                    break;
                case 'b':
                    renderChildrenCircle(currentChildrenCount + 2); // Agrega 2 más
                    body.className = 'sad-mode';
                    break;
                case 'a':
                    renderChildrenCircle(currentChildrenCount + 2); // Agrega 2 más
                    body.className = 'happy-mode';
                    break;
                case 'h':
                    renderChildrenCircle(currentChildrenCount + 2); // Agrega 2 más
                    body.className = 'greet-mode';
                    break;
                case 'j':
                    renderChildrenCircle(6); // Resetea / Muestra directamente a los 6 niños
                    body.className = 'greet-mode';
                    break;
            }
        }

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['s', 'b', 'a', 'h', 'j'].includes(key)) {
                changeState(key);
            }
        });

        // Inicio por defecto con 2 niños
        renderChildrenCircle(2);
    </script>
</body>
</html>
